<meta charset="UTF-8">
<title>Logo Loader</title>
<style>
  :root{
    --bg: #0a0e16;
    --blue-1: #33B6FF;
    --blue-2: #34B7FF;
    --blue-3: #32B6FF;
    --glow: rgba(51,182,255,0.55);
  }
  html,body{
    height:100%; margin:0;
    background: var(--bg);
    display:flex; align-items:center; justify-content:center;
  }

  /* ====== COMPONENT: drop this block into your project ====== */
  .loader-wrap{
    width: 220px;
    height: 132px;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .loader-wrap svg{
    width: 100%;
    height: 100%;
    overflow: visible;
  }
  .loader-wrap path{
    fill: none;
    stroke-width: 14;
    stroke-linecap: round;
    stroke-linejoin: round;
    stroke-dasharray: 1400;
    stroke-dashoffset: 1400;
    filter: drop-shadow(0 0 0px var(--glow));
    animation:
      draw 2.6s cubic-bezier(.65,0,.35,1) infinite,
      glow 2.6s ease-in-out infinite;
  }
  /* small stagger so the three shards draw in sequence, then converge */
  .loader-wrap path:nth-child(1){ stroke: var(--blue-1); animation-delay: 0s,    0s; }
  .loader-wrap path:nth-child(2){ stroke: var(--blue-2); animation-delay: 0.18s, 0.18s; }
  .loader-wrap path:nth-child(3){ stroke: var(--blue-3); animation-delay: 0.36s, 0.36s; }

  @keyframes draw{
    0%   { stroke-dashoffset: 1400; opacity: 0; fill: rgba(51,182,255,0); }
    6%   { opacity: 1; }
    30%  { stroke-dashoffset: 0; fill: rgba(51,182,255,0); }
    42%  { fill: rgba(51,182,255,0.95); }
    /* full logo assembled and held solid here */
    88%  { opacity: 1; fill: rgba(51,182,255,0.95); stroke-dashoffset: 0; }
    96%  { opacity: 0; fill: rgba(51,182,255,0); }
    100% { opacity: 0; fill: rgba(51,182,255,0); stroke-dashoffset: 1400; }
  }
  @keyframes glow{
    0%   { filter: drop-shadow(0 0 0px var(--glow)); }
    45%  { filter: drop-shadow(0 0 10px var(--glow)); }
    90%  { filter: drop-shadow(0 0 10px var(--glow)); }
    100% { filter: drop-shadow(0 0 0px var(--glow)); }
  }
  /* ====== END COMPONENT ====== */
</style>
